<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Variant E — Game Day Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Outfit", sans-serif; -webkit-font-smoothing: antialiased; background: #f1f3f6; }

  .label {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 15px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; color: #7a8293;
    text-align: center; padding: 24px 0 8px;
  }

  .page { padding: 20px; max-width: 800px; margin: 0 auto; background: #0f1729; border-radius: 14px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .wordmark {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 21px; font-weight: 900; text-transform: uppercase; color: #fff;
  }
  .headerRight { display: flex; align-items: center; gap: 12px; }
  .week {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 14px; font-weight: 800; text-transform: uppercase; color: #FF6B5A;
  }
  .updated { font-size: 12px; color: rgba(255,255,255,0.35); }

  .table { border-radius: 10px; overflow: hidden; }
  .tableHead {
    display: grid; grid-template-columns: 2fr 1fr 2fr 80px;
    gap: 8px; padding: 8px 16px;
    background: rgba(255,255,255,0.04);
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: rgba(255,255,255,0.3);
  }
  .row {
    display: grid; grid-template-columns: 2fr 1fr 2fr 80px;
    gap: 8px; padding: 12px 16px; align-items: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .matchup { display: flex; flex-direction: column; gap: 4px; }
  .teamLine { display: flex; align-items: center; gap: 8px; }
  .logo { width: 20px; height: 20px; object-fit: contain; }
  .abbr {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 14px; font-weight: 800; text-transform: uppercase;
    color: rgba(255,255,255,0.8);
  }

  .scores {
    display: flex; flex-direction: column; gap: 4px;
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 18px; font-weight: 900;
    color: rgba(255,255,255,0.4); text-align: center;
  }
  .win { color: #fff; }

  .edgeCell { display: flex; align-items: center; gap: 8px; }
  .edgeBar {
    flex: 1; height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .edgeFill { height: 100%; border-radius: 3px; }
  .edgePct {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 14px; font-weight: 800;
    color: rgba(255,255,255,0.6); width: 36px; text-align: right;
  }

  .pickCell { text-align: center; }
  .pickBadge {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 12px; font-weight: 800; color: #fff;
    padding: 4px 8px; border-radius: 6px;
    text-transform: uppercase; display: inline-block;
  }
  .tossup {
    font-family: "Big Shoulders Display", sans-serif;
    font-size: 18px; color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="label">Variant E — Game Day Dashboard</div>
  <div class="page">
    <div class="header">
      <h1 class="wordmark">BYB</h1>
      <div class="headerRight">
        <span class="week">WK 12</span>
        <span class="updated">Updated 6:15 PM</span>
      </div>
    </div>
    <div class="table">
      <div class="tableHead">
        <span>Matchup</span>
        <span>Predicted</span>
        <span>Edge</span>
        <span>Pick</span>
      </div>

      <!-- PIT at CLE -->
      <div class="row">
        <div class="matchup">
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/pit.png&h=120&w=120" alt="" />
            <span class="abbr">PIT</span>
          </div>
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/cle.png&h=120&w=120" alt="" />
            <span class="abbr">CLE</span>
          </div>
        </div>
        <div class="scores">
          <span class="win">20</span>
          <span>13</span>
        </div>
        <div class="edgeCell">
          <div class="edgeBar"><div class="edgeFill" style="width: 72%; background: #FFB612"></div></div>
          <span class="edgePct">72%</span>
        </div>
        <div class="pickCell">
          <span class="pickBadge" style="background: #FFB612">PIT</span>
        </div>
      </div>

      <!-- DAL at WAS -->
      <div class="row">
        <div class="matchup">
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/dal.png&h=120&w=120" alt="" />
            <span class="abbr">DAL</span>
          </div>
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/wsh.png&h=120&w=120" alt="" />
            <span class="abbr">WAS</span>
          </div>
        </div>
        <div class="scores">
          <span>14</span>
          <span class="win">28</span>
        </div>
        <div class="edgeCell">
          <div class="edgeBar"><div class="edgeFill" style="width: 12%; background: #003594"></div></div>
          <span class="edgePct">88%</span>
        </div>
        <div class="pickCell">
          <span class="pickBadge" style="background: #5A1414">WAS</span>
        </div>
      </div>

      <!-- MIN at CHI -->
      <div class="row">
        <div class="matchup">
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/min.png&h=120&w=120" alt="" />
            <span class="abbr">MIN</span>
          </div>
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/chi.png&h=120&w=120" alt="" />
            <span class="abbr">CHI</span>
          </div>
        </div>
        <div class="scores">
          <span class="win">24</span>
          <span>14</span>
        </div>
        <div class="edgeCell">
          <div class="edgeBar"><div class="edgeFill" style="width: 75%; background: #4F2683"></div></div>
          <span class="edgePct">75%</span>
        </div>
        <div class="pickCell">
          <span class="pickBadge" style="background: #4F2683">MIN</span>
        </div>
      </div>

      <!-- TEN at HOU -->
      <div class="row">
        <div class="matchup">
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/ten.png&h=120&w=120" alt="" />
            <span class="abbr">TEN</span>
          </div>
          <div class="teamLine">
            <img class="logo" src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/hou.png&h=120&w=120" alt="" />
            <span class="abbr">HOU</span>
          </div>
        </div>
        <div class="scores">
          <span>14</span>
          <span class="win">27</span>
        </div>
        <div class="edgeCell">
          <div class="edgeBar"><div class="edgeFill" style="width: 15%; background: #0C2340"></div></div>
          <span class="edgePct">85%</span>
        </div>
        <div class="pickCell">
          <span class="pickBadge" style="background: #03202F">HOU</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
